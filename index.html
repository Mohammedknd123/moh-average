<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Average Grade Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
        }

        .subject {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: calc(50% - 10px);
            padding: 8px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #5cb85c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #4cae4c;
        }

        #result {
            text-align: center;
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Average Grade Calculator</h1>
        <form id="gradeForm">
            <div class="subject">
                <label>Algorithms (TD & Exam):</label>
                <input type="number" id="algorithmsTD" placeholder="TD (0-20)" required>
                <input type="number" id="algorithmsExam" placeholder="Exam (0-20)" required>
            </div>
            <div class="subject">
                <label>Analysis (TD & Exam):</label>
                <input type="number" id="analysisTD" placeholder="TD (0-20)" required>
                <input type="number" id="analysisExam" placeholder="Exam (0-20)" required>
            </div>
            <div class="subject">
                <label>Computer Engineering (TD & Exam):</label>
                <input type="number" id="computerEngineeringTD" placeholder="TD (0-20)" required>
                <input type="number" id="computerEngineeringExam" placeholder="Exam (0-20)" required>
            </div>
            <div class="subject">
                <label>Operating Systems (TD & Exam):</label>
                <input type="number" id="operatingSystemsTD" placeholder="TD (0-20)" required>
                <input type="number" id="operatingSystemsExam" placeholder="Exam (0-20)" required>
            </div>
            <div class="subject">
                <label>Algebra (TD & Exam):</label>
                <input type="number" id="algebraTD" placeholder="TD (0-20)" required>
                <input type="number" id="algebraExam" placeholder="Exam (0-20)" required>
            </div>
            <div class="subject">
                <label>Electricity (TD & Exam):</label>
                <input type="number" id="electricityTD" placeholder="TD (0-20)" required>
                <input type="number" id="electricityExam" placeholder="Exam (0-20)" required>
            </div>
            <div class="subject">
                <label>French (TD & Exam):</label>
                <input type="number" id="frenchTD" placeholder="TD (0-20)" required>
                <input type="number" id="frenchExam" placeholder="Exam (0-20)" required>
            </div>
            <div class="subject">

Mohamed Knd, [12/01/2025 10:43]
<label>Web Office (TD & Exam):</label>
                <input type="number" id="webOfficeTD" placeholder="TD (0-20)" required>
                <input type="number" id="webOfficeExam" placeholder="Exam (0-20)" required>
            </div>
            <button type="submit">Calculate Average</button>
        </form>
        <h2 id="result"></h2>
    </div>
    <script>
        document.getElementById('gradeForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // Get TD and Exam grades
            const grades = [
                [parseFloat(document.getElementById('algorithmsTD').value), parseFloat(document.getElementById('algorithmsExam').value)],
                [parseFloat(document.getElementById('analysisTD').value), parseFloat(document.getElementById('analysisExam').value)],
                [parseFloat(document.getElementById('computerEngineeringTD').value), parseFloat(document.getElementById('computerEngineeringExam').value)],
                [parseFloat(document.getElementById('operatingSystemsTD').value), parseFloat(document.getElementById('operatingSystemsExam').value)],
                [parseFloat(document.getElementById('algebraTD').value), parseFloat(document.getElementById('algebraExam').value)],
                [parseFloat(document.getElementById('electricityTD').value), parseFloat(document.getElementById('electricityExam').value)],
                [parseFloat(document.getElementById('frenchTD').value), parseFloat(document.getElementById('frenchExam').value)],
                [parseFloat(document.getElementById('webOfficeTD').value), parseFloat(document.getElementById('webOfficeExam').value)]
            ];

            // Weights of the subjects
            const weights = [5, 5, 4, 3, 3, 3, 2, 1];
            let totalWeightedScore = 0;
            let totalWeight = 0;

            // Calculate weighted average
            for (let i = 0; i < grades.length; i++) {
                const weightedAverage = (0.4 * grades[i][0]) + (0.6 * grades[i][1]);
                totalWeightedScore += weightedAverage * weights[i];
                totalWeight += weights[i];
            }

            // Calculate final average
            const finalAverage = totalWeightedScore / totalWeight;

            // Display result
            document.getElementById('result').innerText = 'Final Average: ' + finalAverage.toFixed(2);
        });
    </script>
</body>
</html>
